<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="A website to view Murphy Lab Data"
    />
    <link rel="apple-touch-icon" href="logo192.png" />
    <link rel="manifest" href="manifest.json" />
    <title>Murphy Lab | Browse</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="App">
      <header class="App-header">
        <img src="logo.svg" class="App-logo" alt="logo" />
        <p>
          Welcome to the Murphy Lab graph anaylisis and download page!
        </p>
        <p>
          Please choose a dataset:
        </p>
        <div class="link-box">
          <p class="dataset-title">Paper 1</p>

          <div class="button-row">
            <a href="http://localhost:8501" class="action-button">
              Open Graph App
            </a>

            <a
              href="/app/main-site/data/PseudobulkCounts.h5ad"
              download
              class="action-button download-button"
            >
              Download Data
            </a>
          </div>
        </div>
<div>
        <div class="link-box">
          <p class="dataset-title">Paper 2</p>

          <div class="button-row">
            <a href="http://localhost:8502" class="action-button">
              Open Graph App
            </a>

            <a
              href="/app/main-site/data/2025_Dec_pseudobulk_all_cells_log1p_cpm_qn.h5ad"
              download
              class="action-button download-button"
            >
              Download Data
            </a>
          </div>
        </div>
      </header>
      <div>
        <footer class="footer">
          <p class='footer-text'>This site was made by <a href="https://github.com/thatcoderphil12" class='footer-link'>thatcoderphil12</a>. You can find this page fully open-sourced <a href="https://github.com/thatcoderphil12/lab-website" class='footer-link'>here</a>.</p>
        </footer>
      </div>
      </header>
    </div>
  </body>
</html>
